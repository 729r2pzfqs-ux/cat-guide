  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found | CatFinder</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --primary: #f97316; --bg: #fefce8; --text: #1c1917; --muted: #78716c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 6rem; color: var(--primary); margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; max-width: 400px; }
    .redirect-info { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 8px; padding: 1rem; margin: 1rem auto; max-width: 400px; font-size: 0.9rem; color: #c2410c; display: none; }
    a { color: var(--primary); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn { background: var(--primary); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; }
    .btn:hover { background: #ea580c; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🐱</h1>
  <h2>Page Not Found</h2>
  <p>Sorry, the page you're looking for doesn't exist or has been moved. Our cats are working hard to find it!</p>
  <div class="redirect-info" id="redirectInfo"></div>
  <div class="links">
    <a href="/" class="btn">Go Home</a>
    <a href="/quiz/">Take the Quiz</a>
    <a href="/search/">Search Breeds</a>
  </div>
  <script>
  (function() {
    var pathname = window.location.pathname;
    var lower = pathname.toLowerCase();
    var parts = lower.replace(/\/+$/,'').split('/').filter(function(p){return p;});
    var redirectUrl = null;
    var reason = '';

    // Pattern 1: /breeds/{breed-name} without trailing slash
    if (parts[0] === 'breeds' && parts.length === 2 && !pathname.match(/\/$/)) {
      redirectUrl = '/breeds/' + parts[1] + '/';
      reason = 'Adding trailing slash';
    }

    // Pattern 2: Case normalization - /Breeds/Persian → /breeds/persian
    if (!redirectUrl && pathname !== lower) {
      redirectUrl = lower.replace(/\/+$/,'') + '/';
      reason = 'Normalizing URL case';
    }

    // Pattern 3: /breed/{name} → /breeds/{name}/ (singular to plural)
    if (!redirectUrl && parts[0] === 'breed' && parts.length === 2) {
      redirectUrl = '/breeds/' + parts[1] + '/';
      reason = 'Redirecting to correct path';
    }

    // Pattern 4: /compare/{breed1}/{breed2} without trailing slash
    if (!redirectUrl && parts[0] === 'compare' && parts.length >= 2 && !pathname.match(/\/$/)) {
      redirectUrl = pathname + '/';
      reason = 'Adding trailing slash';
    }

    // Pattern 5: Spaces encoded as hyphens or underscores
    if (!redirectUrl && parts.length >= 2) {
      var normalized = parts[1].replace(/_/g, '-').replace(/%20/g, '-');
      if (normalized !== parts[1]) {
        redirectUrl = '/' + parts[0] + '/' + normalized + '/';
        reason = 'Normalizing URL format';
      }
    }

    // Pattern 6: Generic trailing slash
    if (!redirectUrl && !pathname.match(/\.\w+$/) && !pathname.match(/\/$/)) {
      redirectUrl = pathname + '/';
      reason = 'Adding trailing slash';
    }

    if (redirectUrl && redirectUrl !== pathname) {
      var el = document.getElementById('redirectInfo');
      el.innerHTML = '<strong>' + reason + '</strong><br>Redirecting to <a href="' + redirectUrl + '" style="color:#c2410c;text-decoration:underline">' + redirectUrl + '</a>...';
      el.style.display = 'block';
      setTimeout(function(){ window.location.href = redirectUrl; }, 2000);
    }
  })();
  </script>
  </div>
  </div>
  </body>
